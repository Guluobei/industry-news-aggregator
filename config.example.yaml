# ========== 1. 信息源（只填网址或名称）==========
# 新闻网站：直接粘贴网址，系统自动识别并抓取
# 微信公众号：填写 "公众号:公众号名称"（高级用法见下方 wechat_accounts）
# RSS网站：系统会自动发现RSS链接

sources:
  # 主流新闻网站（核心数据源，已验证可用）
  - "https://yicai.com/feed"        # 第一财经 RSS
  - "https://www.21jingji.com"      # 21世纪经济报道 网页
  - "https://36kr.com/feed"         # 36氪 RSS
  - "https://www.jiemian.com"       # 界面新闻 网页

# ========== 2. 微信公众号（高级功能）==========
# 注意：微信公众号采集是"灰色路径"，所有方案都有失效风险
# 推荐使用 wewe-rss（微信读书）后端，平衡稳定性和安全性
#
# 使用步骤：
#   1. 部署 wewe-rss: https://github.com/cooderl/wewe-rss
#   2. 扫码登录微信读书（建议用专用小号）
#   3. 在 Web UI 添加公众号订阅，获取 feed_id（格式: MP_WXS_xxxxx）
#   4. 在下方配置 feed_id

wechat_accounts:
  enabled: true
  default_backend: "wewe-rss"      # wewe-rss | rsshub

  # 后端服务配置
  backends:
    wewe-rss:
      enabled: true
      url: "http://localhost:4000"
    rsshub:
      enabled: true
      url: "http://localhost:1200"

  # 公众号订阅列表
  accounts:
    - name: "中国保险报"
      backend: "wewe-rss"
      feed_id: "MP_WXS_xxxxx"      # 替换为你在 wewe-rss Web UI 添加后获得的 ID
    - name: "保观"
      backend: "wewe-rss"
      feed_id: "MP_WXS_xxxxx"
    # 也支持不指定 feed_id，系统会尝试自动发现（需要后端支持）
    - name: "银保监微课堂"
      backend: "wewe-rss"

# ========== 3. 筛选条件 ==========
filter:
  industry: "保险"                    # 所属行业（用于分类标签）
  keywords:                          # 关注关键词（任一命中即保留）
    - "保险"
    - "医保"
    - "健康险"
    - "监管"
    - "新规"
    - "政策"
    - "创新"
    - "AI"
    - "数字化"
  exclude:                           # 排除关键词（命中任一则丢弃）
    - "娱乐"
    - "八卦"
    - "明星"
    - "广告"
  top_n: 10                          # 每次推送条数
  hours: 168                         # 时间范围（小时），168=近7天

# ========== 4. 推送渠道 ==========
push:
  feishu:
    enabled: true
    # 凭证通过环境变量注入：FEISHU_APP_ID, FEISHU_APP_SECRET
    doc_folder: "your_folder_token"  # 飞书文档存放文件夹token
    notify_chat: "your_chat_id"      # 推送通知的群聊ID

  email:
    enabled: false
    # 凭证通过环境变量注入：EMAIL_USER, EMAIL_PASSWORD
    smtp_host: "smtp.exmail.qq.com"
    smtp_port: 465
    to:
      - "team@example.com"

  local:
    enabled: true
    path: "./output"
    format: "markdown"               # markdown | html | json

# ========== 5. 内容生成 ==========
content:
  summary_mode: "extract"            # extract（提取摘要）| llm（AI生成）
  summary_max_length: 300            # 摘要最大字数
  insight_enabled: false             # 是否生成深度洞察（需配置LLM)
